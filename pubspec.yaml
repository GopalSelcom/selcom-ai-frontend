name: selcom_rides_frontend
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get_it: ^9.2.1
  dio: ^5.9.2
  flutter_secure_storage: ^10.0.0
  socket_io_client: ^3.1.4
  firebase_core: ^4.6.0
  firebase_analytics: ^12.2.0
  firebase_crashlytics: ^5.1.0
  provider: ^6.1.5+1
  logger: ^2.7.0
  dartz: ^0.10.1
  get: ^4.7.3
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.0.2
  pin_code_fields: ^8.0.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  pinput: ^6.0.2
  device_info_plus: ^12.4.0
  firebase_messaging: ^16.1.3
  package_info_plus: ^9.0.1
  pretty_dio_logger: ^1.4.0
  google_maps_flutter: ^2.17.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  google_maps_flutter_android: ^2.19.5
  google_maps_flutter_platform_interface: ^2.15.0
  crypto: ^3.0.6
  http_parser: ^4.1.2
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/json/

  fonts:
    - family: Metropolis
      fonts:
        - asset: assets/fonts/Metropolis-Regular.otf
        - asset: assets/fonts/Metropolis-Medium.otf
          weight: 500
        - asset: assets/fonts/Metropolis-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Metropolis-Bold.otf
          weight: 700
        - asset: assets/fonts/Metropolis-ExtraBold.otf
          weight: 800
        - asset: assets/fonts/Metropolis-Light.otf
          weight: 300
