name: selcom_rides_frontend
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+10

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get_it: ^9.2.1
  dio: ^5.9.2
  flutter_secure_storage: ^10.0.0
  socket_io_client: ^3.1.4
  firebase_core: ^4.6.0
  firebase_analytics: ^12.2.0
  firebase_crashlytics: ^5.1.0
  provider: ^6.1.5+1
  logger: ^2.7.0
  dartz: ^0.10.1
  get: ^4.7.3
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.0.2
  pin_code_fields: ^8.0.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  pinput: ^6.0.2
  device_info_plus: ^12.4.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^17.2.3
  package_info_plus: ^9.0.1
  pretty_dio_logger: ^1.4.0
  google_maps_flutter: ^2.17.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  google_maps_flutter_android: ^2.19.5
  google_maps_flutter_platform_interface: ^2.15.0
  crypto: ^3.0.6
  http_parser: ^4.1.2
  flutter_svg: ^2.0.10
  iconsax: ^0.0.8
  intl: ^0.20.2
  webview_flutter: ^4.13.1
  url_launcher: ^6.3.1
  app_settings: ^5.1.1
  m7_livelyness_detection:
    path: ./packages/face_detection
  permission_handler: ^11.3.1
  live_activities: ^2.1.0
  path_provider: ^2.1.5
  collection: ^1.19.1
  screenshot: ^3.0.0
  share_plus: ^12.0.2
  uuid: ^4.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  pdf: ^3.12.0
  open_filex: ^4.7.0
  gal: ^2.3.2
  image_picker: ^1.1.2
  flutter_dotenv: ^6.0.1
  agora_rtc_engine: ^6.5.3
  flutter_ringtone_player: ^4.0.0+4
  vibration: ^3.1.8
  audioplayers: ^6.1.0
  agora_calling_package:
    path: ./packages/agora_calling_package

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    # Required for flutter_dotenv: `dotenv.load(fileName: '.env')` reads from the asset bundle.
    - .env
    - assets/images/
    - assets/images/payment/
    - assets/images/location/
    - assets/json/
    - assets/sound/


  fonts:
    - family: Metropolis
      fonts:
        - asset: assets/fonts/metropolis/Metropolis-Regular.otf
        - asset: assets/fonts/metropolis/Metropolis-Medium.otf
          weight: 500
        - asset: assets/fonts/metropolis/Metropolis-SemiBold.otf
          weight: 600
        - asset: assets/fonts/metropolis/Metropolis-Bold.otf
          weight: 700
        - asset: assets/fonts/metropolis/Metropolis-ExtraBold.otf
          weight: 800
        - asset: assets/fonts/metropolis/Metropolis-Light.otf
          weight: 300

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/launcher_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFCC00"
  adaptive_icon_foreground: "assets/launcher_foreground.png"

flutter_native_splash:
  color: "#5CB75E"
  ios: true
  android: true
